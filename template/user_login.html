<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .login-container {
        background: #fff;
        padding: 30px 40px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
      }
      h2 {
        text-align: center;
        margin-bottom: 25px;
      }
      label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        width: 100%;
        padding: 12px;
        margin-top: 25px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
      }
      button:hover {
        background-color: #0056b3;
      }
      .extra-links {
        text-align: center;
        margin-top: 15px;
      }
      .extra-links a {
        color: #007bff;
        text-decoration: none;
        font-size: 14px;
      }
      .error-message {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        padding: 10px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2>Login</h2>
      <form method="post" action="{% url 'user-login' %}">
        {% csrf_token %}
        <label for="username">Username or Email</label>
        <input type="text" id="username" name="username" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />

        <button type="submit">Login</button>

        <div class="extra-links">
          <p><a href="{% url 'update-passwd' %}">Forgot Password?</a></p>
          <p>
            Don't have an account?
            <a href="{% url 'user-register' %}">Register here</a>
          </p>
        </div>
      </form>
      <div class="error-message">
        {% if messages %} {% for message in messages %}
        <h3>{{ message }}</h3>
        {% endfor %} {% endif %}
      </div>
    </div>
  </body>
</html>
